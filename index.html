<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Catálogo Impérios Peças</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--tinta:#0d0d0d;--papel:#fff;--linha:#dcdcdc;--fraco:#767676;--marca:#f2f2f2;--zap:#25d366}
*{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}
body{font-family:Inter,system-ui,sans-serif;color:var(--tinta);background:var(--papel);-webkit-font-smoothing:antialiased}
header{background:var(--tinta);background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:4px 4px;
  height:100px;display:flex;align-items:center;justify-content:flex-end;padding:0 28px;position:sticky;top:0;z-index:30}
.logo-img{height:76px;width:auto;display:block;mix-blend-mode:screen}
.wrap{display:grid;grid-template-columns:250px 1fr;min-height:calc(100vh - 88px)}
aside{border-right:1px solid var(--tinta);padding:34px 0 60px}
.grp{border:0}
.grp>button{width:100%;display:flex;align-items:center;gap:12px;background:none;border:0;cursor:pointer;
  font:inherit;font-size:17px;padding:11px 20px;text-align:left;color:var(--tinta)}
.grp>button:hover{background:var(--marca)}
.chev{width:9px;height:9px;border-right:2px solid #9a9a9a;border-bottom:2px solid #9a9a9a;
  transform:rotate(-45deg);transition:transform .2s;flex:none}
.grp.open .chev{transform:rotate(45deg)}
.filhos{display:none;padding:2px 0 10px}
.grp.open .filhos{display:block}
.filhos button{display:block;width:100%;text-align:left;background:none;border:0;cursor:pointer;font:inherit;
  font-size:13px;color:var(--fraco);padding:7px 20px 7px 41px}
.filhos button:hover{color:var(--tinta);background:var(--marca)}
.filhos button[aria-current=true]{color:var(--tinta);font-weight:600;box-shadow:inset 3px 0 0 var(--tinta)}
main{padding:0 40px 80px}
.hero{text-align:center;padding:76px 0 30px}
h1{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(34px,5vw,60px);letter-spacing:-.01em}
.busca{position:relative;max-width:760px;margin:34px auto 0}
.busca input{width:100%;height:74px;border:2.5px solid var(--tinta);border-radius:40px;padding:0 74px 0 32px;
  font:inherit;font-size:17px;outline:0}
.busca input:focus{box-shadow:0 0 0 4px rgba(0,0,0,.07)}
.busca svg{position:absolute;right:26px;top:50%;transform:translateY(-50%);pointer-events:none}
.dica{text-align:center;color:var(--fraco);font-size:13px;margin-top:14px}
.dica code{font-family:'IBM Plex Mono',monospace;background:var(--marca);padding:2px 6px;border-radius:3px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:26px 0 0}
.chip{border:1.5px solid var(--tinta);background:none;cursor:pointer;font:inherit;font-size:12.5px;
  padding:7px 14px;border-radius:20px;color:var(--tinta)}
.chip:hover{background:var(--marca)}
.chip[aria-pressed=true]{background:var(--tinta);color:#fff}
.chip small{color:inherit;opacity:.55;margin-left:5px}
.barra{display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap;
  border-bottom:1px solid var(--tinta);padding-bottom:12px;margin:46px 0 26px}
.cont{font-size:13px;color:var(--fraco);letter-spacing:.06em;text-transform:uppercase}
.limpar{background:none;border:0;cursor:pointer;font:inherit;font-size:13px;text-decoration:underline;color:var(--tinta)}
.grade{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.card{border:1px solid var(--linha);padding:20px;display:flex;flex-direction:column;gap:11px;transition:border-color .15s}
.card:hover{border-color:var(--tinta)}
.foto-img{aspect-ratio:4/3;width:100%;object-fit:contain;background:var(--marca)}
.foto-img.erro{visibility:hidden}
.foto{aspect-ratio:4/3;background:var(--marca);display:grid;place-items:center;color:#b6b6b6;font-size:11px;
  letter-spacing:.16em;text-transform:uppercase;border:1px dashed #d2d2d2}
.tit{font-size:15px;font-weight:600;line-height:1.35}
.cods{display:flex;flex-wrap:wrap;gap:6px}
.cod{font-family:'IBM Plex Mono',monospace;font-size:11.5px;background:var(--tinta);color:#fff;padding:3px 8px;border-radius:2px}
.desc{font-size:13px;color:#4a4a4a;line-height:1.5}
.veic{font-size:12px;color:var(--fraco);line-height:1.5;border-top:1px solid var(--linha);padding-top:10px}
.veic b{color:var(--tinta);font-weight:600;letter-spacing:.05em;font-size:10px;text-transform:uppercase;display:block;margin-bottom:3px}
.tags{display:flex;gap:6px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fraco)}
.pedir{margin-top:auto;display:flex;align-items:center;justify-content:center;gap:8px;height:42px;background:var(--tinta);
  color:#fff;text-decoration:none;font-size:13px;font-weight:500;border-radius:2px}
.pedir:hover{background:#333}
mark{background:#ffe680;color:inherit;padding:0 1px}
.vazio{text-align:center;padding:80px 20px;color:var(--fraco)}
.vazio strong{display:block;font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--tinta);margin-bottom:8px}
.flut{position:fixed;right:24px;bottom:24px;display:flex;flex-direction:column;gap:14px;z-index:40}
.flut a{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;box-shadow:0 3px 14px rgba(0,0,0,.24)}
.f-zap{background:var(--zap)}
.f-ig{background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7)}
.mais{display:block;margin:40px auto 0;padding:14px 40px;background:none;border:1.5px solid var(--tinta);
  cursor:pointer;font:inherit;font-size:14px}
.mais:hover{background:var(--tinta);color:#fff}
@media(max-width:820px){header{height:64px;padding:0 16px}.logo-img{height:44px}.wrap{grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid var(--tinta);padding:14px 0}
 main{padding:0 18px 80px}.hero{padding:40px 0 10px}.busca input{height:60px;font-size:15px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
:focus-visible{outline:2px solid var(--tinta);outline-offset:2px}
</style></head><body>

const norm = s => (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
function indexar(lista){lista.forEach(p=>p._b=norm([p.t,p.c.join(" "),p.d,p.v,p.m,p.g].join(" ")));}
indexar(P);

function parseCSV(txt){
  const rows=[];let cur="",aspas=false,r=[];
  for(let i=0;i<txt.length;i++){
    const ch=txt[i];
    if(aspas){
      if(ch==='"'){ if(txt[i+1]==='"'){cur+='"';i++;} else aspas=false; }
      else cur+=ch;
    }else{
      if(ch==='"')aspas=true;
      else if(ch===','){r.push(cur);cur="";}
      else if(ch==='\n'||ch==='\r'){ if(ch==='\r'&&txt[i+1]==='\n')i++;
        r.push(cur);cur="";if(r.some(c=>c!=="")) rows.push(r);r=[];}
      else cur+=ch;
    }
  }
  if(cur!==""||r.length){r.push(cur);if(r.some(c=>c!==""))rows.push(r);}
  return rows;
}

async function carregar(){
  try{
    const resp=await fetch(SHEET_CSV,{cache:"no-store"});
    if(!resp.ok)throw new Error("HTTP "+resp.status);
    const rows=parseCSV(await resp.text());
    const hd=rows[0].map(c=>c.trim().toLowerCase());
    const ix=n=>hd.indexOf(n);
    const cols=["sku","codigos_alternativos","titulo","descricao","compatibilidade","marca","linha","categoria","foto_url","ativo"].map(ix);
    const [iSku,iAlt,iTit,iDes,iComp,iMar,iLin,iCat,iFoto,iAtv]=cols;
    if(iSku<0||iTit<0)throw new Error("colunas nao encontradas");
    const novos=[];
    for(const r of rows.slice(1)){
      if(((r[iAtv]||"SIM")+"").trim().toUpperCase()==="NAO")continue;
      if(!((r[iSku]||"").trim())&&!((r[iTit]||"").trim()))continue;
      novos.push({t:(r[iTit]||"").trim(),
        c:[(r[iSku]||"").trim()].concat((r[iAlt]||"").split(";").map(s=>s.trim())).filter(Boolean),
        d:(r[iDes]||"").trim(),v:(r[iComp]||"").trim(),m:(r[iMar]||"").trim()||"OUTROS",
        l:(r[iLin]||"").trim()||"Linha Leve",g:(iCat>=0?(r[iCat]||"").trim():"")||"Diversos",
        f:iFoto>=0?(r[iFoto]||"").trim():""});
    }
    if(!novos.length)throw new Error("planilha vazia");
    P=novos;indexar(P);
    const arv={};
    P.forEach(p=>{arv[p.l]=arv[p.l]||[];if(!arv[p.l].includes(p.m))arv[p.l].push(p.m);});
    Object.values(arv).forEach(a=>a.sort());ARV=arv;
    document.getElementById("fonte").textContent="Atualizado da planilha \u2022 "+P.length+" produtos";
  }catch(e){
    document.getElementById("fonte").textContent="Sem conexao com a planilha \u2014 mostrando ultima copia salva";
    console.warn("Sheets:",e);
  }
  nav();render();
}

function marcar(txt,t){
  if(!t) return esc(txt);
  const i = norm(txt).indexOf(t);
  if(i<0) return esc(txt);
  return esc(txt.slice(0,i))+"<mark>"+esc(txt.slice(i,i+t.length))+"</mark>"+esc(txt.slice(i+t.length));
}
const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function nav(){
  const el=document.getElementById("nav");
  el.innerHTML = Object.entries(ARV).map(([linha,marcas])=>`
    <div class="grp" data-linha="${linha}">
      <button class="cab"><i class="chev"></i>${linha}</button>
      <div class="filhos">${marcas.map(m=>`<button data-marca="${esc(m)}">${esc(m)}</button>`).join("")}</div>
    </div>`).join("");
  el.querySelectorAll(".cab").forEach(b=>b.onclick=()=>b.parentElement.classList.toggle("open"));
  el.querySelectorAll(".filhos button").forEach(b=>b.onclick=()=>{
    const linha=b.closest(".grp").dataset.linha, marca=b.dataset.marca;
    const igual = filtro.linha===linha && filtro.marca===marca;
    filtro = igual ? {linha:null,marca:null,cat:null} : {linha,marca,cat:null};
    mostrando=PASSO; render();
  });
}

function filtrados(){
  const t=norm(termo);
  return P.filter(p=>
    (!filtro.linha || p.l===filtro.linha) &&
    (!filtro.marca || p.m===filtro.marca) &&
    (!filtro.cat || p.g===filtro.cat) &&
    (!t || p._b.includes(t)));
}

function card(p){
  const msg = encodeURIComponent(`Olá! Tenho interesse na peça: ${p.t} (${p.c[0]||"sem código"}).`);
  return `<article class="card">
    ${p.f?`<img class="foto-img" loading="lazy" src="${esc(p.f)}" alt="${esc(p.t)}" onerror="this.classList.add('erro')">`:`<div class="foto">Foto em breve</div>`}
    <div class="tags"><span>${esc(p.m)}</span>·<span>${esc(p.g)}</span></div>
    <h3 class="tit">${marcar(p.t,norm(termo))}</h3>
    <div class="cods">${p.c.map(c=>`<span class="cod">${marcar(c,norm(termo))}</span>`).join("")}</div>
    ${p.d?`<p class="desc">${marcar(p.d,norm(termo))}</p>`:""}
    ${p.v?`<p class="veic"><b>Aplicação</b>${marcar(p.v,norm(termo))}</p>`:""}
    <a class="pedir" target="_blank" rel="noopener" href="https://wa.me/${ZAP}?text=${msg}">Pedir pelo WhatsApp</a>
  </article>`;
}

function chips(){
  const base = P.filter(p=>
    (!filtro.linha || p.l===filtro.linha) &&
    (!filtro.marca || p.m===filtro.marca));
  const cont={};
  base.forEach(p=>cont[p.g]=(cont[p.g]||0)+1);
  const cats=Object.keys(cont).sort();
  const el=document.getElementById("chips");
  if(cats.length<2 && !filtro.cat){el.innerHTML="";return;}
  el.innerHTML=cats.map(c=>
    `<button class="chip" data-cat="${esc(c)}" aria-pressed="${c===filtro.cat}">${esc(c)}<small>${cont[c]}</small></button>`).join("");
  el.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{
    filtro.cat = filtro.cat===b.dataset.cat ? null : b.dataset.cat;
    mostrando=PASSO; render();});
}
function render(){
  chips();
  const r=filtrados();
  const cont=document.getElementById("cont");
  const rot=[filtro.cat,filtro.marca,filtro.linha].filter(Boolean).join(" · ");
  cont.textContent = `${r.length} ${r.length===1?"produto":"produtos"}${rot?" — "+rot:""}`;
  document.getElementById("limpar").hidden = !(filtro.linha||filtro.marca||filtro.cat||termo);
  document.getElementById("grade").innerHTML = r.length
    ? r.slice(0,mostrando).map(card).join("")
    : `<div class="vazio" style="grid-column:1/-1"><strong>Nada encontrado</strong>
       Confira o código ou tente pelo nome do veículo. Se a peça não está aqui, chame no WhatsApp — a gente procura.</div>`;
  const mais=document.getElementById("mais");
  mais.hidden = r.length<=mostrando;
  mais.textContent = `Ver mais ${Math.min(PASSO,r.length-mostrando)} de ${r.length-mostrando}`;
  document.querySelectorAll(".filhos button").forEach(b=>
    b.setAttribute("aria-current", b.dataset.marca===filtro.marca && b.closest(".grp").dataset.linha===filtro.linha));
}

let deb; document.getElementById("q").oninput = e=>{
  clearTimeout(deb); deb=setTimeout(()=>{termo=e.target.value.trim(); mostrando=PASSO; render();},130);
};
document.getElementById("mais").onclick=()=>{mostrando+=PASSO; render();};
document.getElementById("limpar").onclick=()=>{
  filtro={linha:null,marca:null,cat:null}; termo=""; document.getElementById("q").value=""; mostrando=PASSO; render();};

render(); carregar();
</script></body></html>
